name: Sync Google Sheets Data

on:
  #schedule:
  #  - cron: '0 23 * * *' # 매일 오전 8시 KST (UTC 23:00)
  workflow_dispatch: # 수동 실행 버튼 활성화
    inputs:
      check_jobs:
        description: '채용 공고 사이트 확인 여부'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Sync Script
        run: |
          FLAGS=""
          if [[ "${{ github.event_name }}" == "schedule" ]] || [[ "${{ github.event.inputs.check_jobs }}" == "true" ]]; then
            FLAGS="--check-jobs"
          fi
          node scripts/sync-sheets.cjs $FLAGS
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_GEOCODING_API_KEY: ${{ secrets.VITE_GOOGLE_GEOCODING_API_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync company data and job postings"
          file_pattern: "public/data/companies.json"
